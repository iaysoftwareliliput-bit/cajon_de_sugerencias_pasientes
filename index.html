<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugerencias o Reclamos</title>

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.form-container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid #ccc;
    resize: none;
    transition: 0.3s;
}

textarea:focus {
    border-color: #764ba2;
    outline: none;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #667eea;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #5a67d8;
}
</style>
</head>

<body>

<div class="form-container">
    <h2>Sugerencia o Reclamo</h2>

    <form action="https://formsubmit.co/Liliput.peru@gmail.com" method="POST">

        <textarea 
            name="sugerencia_o_reclamo" 
            placeholder="Escribe tu mensaje..." 
            rows="6" 
            required>
        </textarea>

        <!-- Asunto -->
        <input type="hidden" name="_subject" value="Paciente - Nueva sugerencia/reclamo">

        <!-- Identificador oculto -->
        <input type="hidden" name="Origen" value="Paciente">

        <button type="submit">Enviar</button>
    </form>
</div>

</body>
</html>
