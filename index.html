<form action="https://formsubmit.co/Liliput.peru@gmail.com" method="POST">

    <div class="campo">
        <label for="mensaje"> mensaje:</label>
        <textarea 
            id="mensaje"
            name="sugerencia_o_reclamo" 
            placeholder="Escribe aquí tu sugerencia o reclamo de forma detallada..." 
            rows="8" 
            required
        ></textarea>
    </div>

    <!-- Asunto del correo -->
    <input type="hidden" name="_subject" value="Nueva sugerencia/reclamo - Paciente">

    <!-- Identificador -->
    <input type="hidden" name="tipo" value="Paciente">

    <button type="submit"> Enviar mensaje</button>

</form>
